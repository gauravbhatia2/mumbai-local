name: Refresh Mumbai timetable

concurrency:
  group: refresh-mumbai-timetable
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Supabase timetable tables
        run: npm run ingest
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          TIMETABLE_SOURCE_URL: ${{ secrets.TIMETABLE_SOURCE_URL }}
          TIMETABLE_SOURCE_PATH: data/mumbai-local-sample.csv
